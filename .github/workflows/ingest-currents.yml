name: ingest-currents

on:
  schedule:
    - cron: "0 13 * * *" # daily, after the CMEMS GLO12 update
  workflow_dispatch:
    inputs:
      cycle:
        description: "Cycle YYYYMMDDTHH (default: today 00Z)"
        required: false

concurrency:
  group: ingest-currents
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - run: uv sync --extra currents
      - run: uv run ingest currents ${CYCLE:+--cycle "$CYCLE"}
        env:
          CYCLE: ${{ inputs.cycle }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
          COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
          # Bound the toolbox's nested HTTP retries so the pipeline-level
          # 5/15-minute authentication-outage backoff fits inside this job.
          COPERNICUSMARINE_HTTPS_TIMEOUT: "20"
          COPERNICUSMARINE_HTTPS_RETRIES: "2"
