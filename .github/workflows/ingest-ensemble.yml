name: ingest-ensemble

on:
  schedule:
    - cron: "0 4,10,16,22 * * *" # ~4 h after each GEFS cycle
  workflow_dispatch:
    inputs:
      cycle:
        description: "Cycle YYYYMMDDTHH (default: latest complete)"
        required: false
      allow_member_drift:
        description: "Proceed even when member count != 31"
        type: boolean
        default: false

concurrency:
  group: ingest-ensemble
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # 31 members x 89 steps is the slowest layer
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - run: uv sync
      - run: >
          uv run ingest ensemble ${CYCLE:+--cycle "$CYCLE"}
          ${DRIFT:+--allow-member-drift}
        env:
          CYCLE: ${{ inputs.cycle }}
          DRIFT: ${{ inputs.allow_member_drift == true && '1' || '' }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
