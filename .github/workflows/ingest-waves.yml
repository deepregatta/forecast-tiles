name: ingest-waves

on:
  schedule:
    - cron: "45 3,9,15,21 * * *" # ~3.75 h after each GFS-Wave cycle
  workflow_dispatch:
    inputs:
      cycle:
        description: "Cycle YYYYMMDDTHH (default: latest complete)"
        required: false

concurrency:
  group: ingest-waves
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.13'
      - run: uv sync
      - run: uv run ingest waves ${CYCLE:+--cycle "$CYCLE"}
        env:
          CYCLE: ${{ inputs.cycle }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
